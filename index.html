<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Menú GTA Style</title>

<style>
body {
    margin: 0;
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
    font-family: Arial, sans-serif;
    color: white;
}

/* Oscurecer fondo */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

/* Menú */
.menu {
    position: absolute;
    top: 50%;
    left: 10%;
    transform: translateY(-50%);
}

.menu h1 {
    font-size: 2.5em;
    margin-bottom: 20px;
}

.option {
    font-size: 1.8em;
    padding: 10px;
    transition: all 0.2s;
}

.option.active {
    color: yellow;
    transform: translateX(20px);
    text-shadow: 0 0 10px yellow;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="menu">
    <h1>MENÚ</h1>
    <div class="option active">Iniciar partida</div>
    <div class="option">Cargar partida</div>
    <div class="option">Opciones</div>
    <div class="option">Salir</div>
</div>

<script>
let opciones = document.querySelectorAll(".option");
let index = 0;

function actualizarMenu() {
    opciones.forEach((op, i) => {
        op.classList.remove("active");
        if (i === index) op.classList.add("active");
    });
}

document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowDown") {
        index = (index + 1) % opciones.length;
        actualizarMenu();
    }
    if (e.key === "ArrowUp") {
        index = (index - 1 + opciones.length) % opciones.length;
        actualizarMenu();
    }
    if (e.key === "Enter") {
        alert("Seleccionaste: " + opciones[index].innerText);
    }
});
</script>

</body>
</html>
