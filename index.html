<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🔥 METAL APOCALÍPTICO 🦖🏎️🍺</title>

<style>
body {
    margin: 0;
    background: black;
    color: #ff2e2e;
    font-family: Impact, sans-serif;
    text-align: center;
    overflow-x: hidden;
}

/* Fuego animado */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,100,0,0.2), transparent 70%);
    animation: fuego 0.3s infinite alternate;
    z-index: -1;
}

@keyframes fuego {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
}

header {
    font-size: 3em;
    padding: 30px;
    text-shadow: 0 0 20px red, 0 0 40px orange;
}

.section {
    margin: 40px;
}

.card {
    display: inline-block;
    background: rgba(255,0,0,0.1);
    border: 2px solid red;
    padding: 20px;
    margin: 20px;
    border-radius: 10px;
    transition: transform 0.3s;
}

.card:hover {
    transform: scale(1.2) rotate(2deg);
}

/* Botón explosivo */
button {
    padding: 20px 40px;
    font-size: 1.5em;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 10px;
    box-shadow: 0 0 20px red;
}

button:hover {
    background: orange;
}

/* Explosión */
.explosion {
    position: fixed;
    width: 50px;
    height: 50px;
    background: radial-gradient(circle, yellow, orange, red, transparent);
    border-radius: 50%;
    pointer-events: none;
    animation: boom 0.6s ease-out forwards;
}

@keyframes boom {
    to {
        transform: scale(6);
        opacity: 0;
    }
}
</style>
</head>

<body>

<header>
🔥 METAL APOCALÍPTICO 🦖🏎️🍺 🔥
</header>

<div class="section">
    <div class="card">🦖 DINOSAURIOS DESTRUCTORES</div>
    <div class="card">🏎️ COCHES A 300KM/H</div>
    <div class="card">🍺 CERVEZA INFINITA</div>
</div>

<div class="section">
    <button onclick="explosion(event)">💥 ACTIVAR CAOS 💥</button>
</div>

<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
function explosion(e) {
    for (let i = 0; i < 10; i++) {
        let boom = document.createElement("div");
        boom.className = "explosion";
        boom.style.left = (e.clientX + Math.random()*100 - 50) + "px";
        boom.style.top = (e.clientY + Math.random()*100 - 50) + "px";
        document.body.appendChild(boom);

        setTimeout(() => boom.remove(), 600);
    }
}
</script>

</body>
</html>
